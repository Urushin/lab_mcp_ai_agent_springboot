github:
  owner: ${GITHUB_OWNER:default}
  repo: ${GITHUB_REPO:default}

gemini:
  api-key: ${GEMINI_API_KEY:default}
  model: gemini-2.0-flash
  max-tokens: 800
  timeout-seconds: 60

mcp:
  base-url: ${MCP_BASE_URL:http://localhost:3333}
  path: ${MCP_PATH:/mcp}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
